steps:
    - name: Check out repository
      uses: actions/checkout@v4

    # --- השורות החדשות שאתה מוסיף עכשיו ---
    - name: Debug - Find 10 Largest Files
      run: |
        echo "=== Top 10 Largest Files in Project ==="
        Get-ChildItem -Path . -Recurse -File -ErrorAction SilentlyContinue | Sort-Object Length -Descending | Select-Object @{Name="File Path";Expression={$_.FullName.Replace("D:\a\Zayit.mtk\Zayit.mtk\", "")}}, @{Name="Size (MB)";Expression={[math]::round($_.Length / 1MB, 2)}} -First 10 | Format-Table -AutoSize
    # -------------------------------------

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'liberica'
        java-version: '25'
name: Build Installer

on:
  push:
    branches: [ master ] # ירוץ בכל פעם שתעלה קוד לענף הראשי

jobs:
  build-windows:
    runs-on: windows-latest # נבקש שרת עם מערכת הפעלה חלונות

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    # 1. התקנת Java (הכרחי עבור Gradle)
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'liberica' # כפי שמוגדר אצלך בפרויקט
        java-version: '25'

    # 2. התקנת Rust (הכרחי עבור ה-Installer Wrapper)
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    # 3. בניית ה-NSIS באמצעות Gradle
    - name: Build NSIS with Gradle
      run: .\gradlew :SeforimApp:packageGraalvmNsis
      # הערה: אם זה קורס בגלל זיכרון, שנה ל: .\gradlew :SeforimApp:packageReleaseNsis

    # 4. הרצת סקריפט ה-Batch שלך (שמריץ את Cargo ומאחד את הקבצים)
    - name: Run Build Script
      run: .\build-script.bat # החלף בשם האמיתי של קובץ ה-bat שלך

    # 5. שמירת קובץ ה-EXE הסופי כדי שתוכל להוריד אותו מגיטהב
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zayit-Installer
        path: target/release/*.exe
