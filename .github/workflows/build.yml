name: Build Installer

on:
  push:
    branches: [ master ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    # 1. התקנת Java (באמצעות liberica)
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'liberica'
        java-version: '25'

    # 2. התקנת Rust
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    # 3. בניית ה-NSIS באמצעות Gradle 
    # כאן החלפנו ל-Release רגיל במקום GraalVM כדי למנוע את דרישת ה-15GB
    - name: Build NSIS with Gradle
      run: .\gradlew :SeforimApp:packageReleaseNsis

    # 4. הרצת סקריפט ה-Batch שלך (החלף את השם אם קראת לקובץ ה-bat שלך אחרת)
    - name: Run Build Script
      run: .\build-script.bat 

    # 5. שמירת קובץ ה-EXE הסופי להורדה
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zayit-Installer
        path: target/release/*.exe
