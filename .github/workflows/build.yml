name: Build Installer and Portable

on:
  push:
    branches: [ master ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 1. התקנת Java (באמצעות liberica)
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'liberica'
        java-version: '25'

    # 2. בניית שני הפורמטים ב-Gradle: גם התקנה (Nsis) וגם גרסה ניידת (Zip)
    - name: Build NSIS and ZIP with Gradle
      run: .\gradlew :SeforimApp:packageReleaseNsis :SeforimApp:packageReleaseZip

    # 3. שמירת קובץ ההתקנה הרגיל (ה-EXE של ה-Installer ללא מגבלת ה-15GB)
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zayit-Standard-Installer
        path: SeforimApp/build/compose/binaries/main-release/nsis/*.exe

    # 4. שמירת הגרסה הניידת (קובץ ה-ZIP הנייד)
    - name: Upload Portable Version Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zayit-Portable-ZIP
        path: SeforimApp/build/compose/binaries/main-release/zip/*.zip
